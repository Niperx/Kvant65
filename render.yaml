# Render: демо-сайт на SQLite из репозитория (без PostgreSQL)
# В репо должны быть: db.sqlite3 и при необходимости папка media/
# dashboard.render.com → New → Blueprint → выберите репозиторий

services:
  - type: web
    name: kvant
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn kvant_site.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: kvant_site.settings.production
      # DATABASE_URL не задаём — используется db.sqlite3 из репо
      - key: WEB_CONCURRENCY
        value: "2"
